# CircuitSense — Default Configuration

model:
  input_channels: 1          # Number of signal channels (1=voltage, 2=V+I, 3=V+I+power)
  sequence_length: 1024      # Waveform samples per window
  num_classes: 8             # Fault categories
  cnn_channels: [64, 128, 256]
  cnn_kernel_size: 7
  lstm_hidden: 256
  lstm_layers: 2
  lstm_dropout: 0.3
  attention_heads: 8
  classifier_dropout: 0.4

data:
  raw_dir: data/raw
  processed_dir: data/processed
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1
  num_workers: 4
  pin_memory: true

  # Synthetic generator
  samples_per_class: 1250    # 10000 total for 8 classes
  sample_rate: 10000         # Hz
  duration: 0.1024           # seconds → 1024 samples
  noise_std: 0.02

  # Augmentation
  augment: true
  aug_noise_prob: 0.4
  aug_scale_prob: 0.3
  aug_timewarp_prob: 0.2
  aug_dropout_prob: 0.2

training:
  epochs: 15
  batch_size: 128
  learning_rate: 3.0e-4
  weight_decay: 1.0e-4
  scheduler: cosine_warmup
  warmup_epochs: 5
  min_lr: 1.0e-6
  grad_clip: 1.0
  early_stopping_patience: 10
  loss: focal              # focal | cross_entropy
  focal_gamma: 2.0

wandb:
  project: circuitsense
  entity: null             # set your W&B username
  log_every: 10

inference:
  model_path: checkpoints/best.pt
  onnx_path: checkpoints/circuitsense.onnx
  device: auto             # auto | cpu | cuda | mps
  threshold: 0.6           # Minimum confidence to report

fault_classes:
  0: NORMAL
  1: CAP_DEGRADED
  2: CAP_SHORT
  3: RES_DRIFT
  4: TRANSISTOR_SATURATION
  5: DIODE_OPEN
  6: INDUCTOR_CORE_SAT
  7: POWER_RAIL_NOISE
